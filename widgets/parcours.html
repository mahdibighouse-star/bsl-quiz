<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BSL · Parcours 7 modules</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --gold:#C9A94D; --gold-soft:#e3c976; --gold-deep:#9c7e2f; --dark:#080808; --cream:#F5F0E8; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--cream);
    background:
      radial-gradient(100% 120% at 50% -30%, rgba(201,169,77,.14) 0%, transparent 55%),
      var(--dark);
    padding:40px 40px 46px;
  }
  .head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:34px}
  .head .eyebrow{font-size:10px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
  .head .ttl{font-family:'Cormorant Garamond',serif;font-size:26px;color:#fff}
  .head .ttl .g{font-style:italic;color:var(--gold-soft)}
  .head .count{font-size:12px;color:rgba(245,240,232,.5);letter-spacing:.04em}

  .track{position:relative;display:grid;grid-template-columns:repeat(7,1fr);gap:0}
  .track::before{content:"";position:absolute;top:19px;left:7%;right:7%;height:1px;background:linear-gradient(90deg,var(--gold-deep),rgba(201,169,77,.25))}
  .node{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 6px}
  .dot{
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--gold-soft);
    background:#0d0d0d;border:1px solid rgba(201,169,77,.45);transition:.3s;
  }
  .node:hover .dot{background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:#1a1305;border-color:var(--gold);box-shadow:0 6px 22px rgba(201,169,77,.4)}
  .lbl{margin-top:13px;font-size:11px;line-height:1.4;color:rgba(245,240,232,.62);max-width:96px}
  .lbl b{display:block;color:#fff;font-weight:600;font-size:11.5px;letter-spacing:.05em;margin-bottom:3px}
  @media(max-width:680px){
    .track{grid-template-columns:repeat(4,1fr);gap:22px 0}
    .track::before{display:none}
  }
</style>
</head>
<body>
  <div class="head">
    <div>
      <div class="eyebrow">Votre parcours</div>
      <div class="ttl">7 modules, une <span class="g">expertise complète</span></div>
    </div>
    <div class="count">Théorie · Quiz · Pratique</div>
  </div>

  <div class="track">
    <div class="node"><div class="dot">1</div><div class="lbl"><b>M01</b>Prérequis scientifiques</div></div>
    <div class="node"><div class="dot">2</div><div class="lbl"><b>M02</b>Les 3 techniques</div></div>
    <div class="node"><div class="dot">3</div><div class="lbl"><b>M03</b>Matériel &amp; filaments</div></div>
    <div class="node"><div class="dot">4</div><div class="lbl"><b>M04</b>Consultation &amp; sécurité</div></div>
    <div class="node"><div class="dot">5</div><div class="lbl"><b>M05</b>Les 3 phases</div></div>
    <div class="node"><div class="dot">6</div><div class="lbl"><b>M06</b>Positionnement par zone</div></div>
    <div class="node"><div class="dot">7</div><div class="lbl"><b>M07</b>Lancer son cabinet</div></div>
  </div>
</body>
</html>
