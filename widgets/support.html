<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BSL · Accompagnement</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--gold:#C9A94D;--gold-soft:#e3c976;--dark:#080808;--cream:#F5F0E8;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--cream);
    background:radial-gradient(120% 140% at 15% -20%,rgba(201,169,77,.18) 0%,transparent 52%),var(--dark);
    padding:40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:28px;
    border:1px solid rgba(201,169,77,.16);border-radius:20px}
  .left{max-width:520px}
  .eyebrow{font-size:10px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:10px}
  .eyebrow .bar{width:28px;height:1px;background:var(--gold)}
  .title{font-family:'Cormorant Garamond',serif;font-size:30px;line-height:1.15;color:#fff;margin-top:12px}
  .title .g{font-style:italic;color:var(--gold-soft)}
  .sub{font-size:14px;line-height:1.6;color:rgba(245,240,232,.62);margin-top:12px}
  .actions{display:flex;flex-direction:column;gap:12px;min-width:230px}
  .btn{display:flex;align-items:center;justify-content:space-between;gap:14px;text-decoration:none;
    padding:14px 18px;border-radius:13px;border:1px solid rgba(201,169,77,.3);
    background:rgba(201,169,77,.06);transition:border-color .25s,background .25s}
  .btn:hover{border-color:var(--gold);background:rgba(201,169,77,.12)}
  .btn .k{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.5)}
  .btn .v{font-size:14px;font-weight:500;color:#fff;margin-top:3px}
  .btn .arrow{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-soft)}
  @media(max-width:620px){body{flex-direction:column;align-items:flex-start}.actions{width:100%}}
</style></head>
<body>
  <div class="left">
    <div class="eyebrow"><span class="bar"></span>Accompagnement</div>
    <div class="title">Une question sur votre <span class="g">parcours</span> ?</div>
    <p class="sub">Notre équipe vous accompagne à chaque étape — de l'inscription à la pratique sur place à Bruxelles. Écrivez-nous, nous répondons sous 48 h.</p>
  </div>
  <div class="actions">
    <a class="btn" href="mailto:contact@bskinlegacy.be">
      <span><span class="k">Par e-mail</span><span class="v">contact@bskinlegacy.be</span></span>
      <span class="arrow">&rarr;</span>
    </a>
    <a class="btn" href="https://bskinlegacy.be/contact" target="_blank" rel="noopener">
      <span><span class="k">Formulaire</span><span class="v">Demander à être rappelé·e</span></span>
      <span class="arrow">&rarr;</span>
    </a>
  </div>
</body></html>
